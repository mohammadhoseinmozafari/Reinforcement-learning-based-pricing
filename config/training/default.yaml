environment:
  num_consumers: 50
  episode_length: 100

agent:
  hidden_dim: 32
  lr_actor: 0.0005
  lr_critic: 0.0005
  lr_alpha: 0.0001
  target_entropy: -0.5
  gamma: 0.9
  tau: 0.005
  auto_alpha: true
  alpha: 1.0
  log_std_min: -10.0
  log_std_max: 0.1
  buffer_size: 100000
  batch_size: 256
  lr_scheduler: null
  lr_scheduler_kwargs: null
  device: null

training:
  num_episodes: 1000
  warmup_steps: 500
  updates_per_step: 2

evaluation:
  eval_freq: 10
  eval_episodes: 5

logging:
  log_freq: 1
  save_freq: 100
  verbose: true

reproducibility:
  seed: 42
